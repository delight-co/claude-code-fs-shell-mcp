name: Bug report
description: Report unexpected behaviour in claude-code-fs-shell-mcp.
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        The smallest example that reproduces the problem. Include the command
        you ran, the configuration, and the input.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include logs (start the daemon with `--log-format=text` for human-readable output) and any error messages.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or container image digest.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, and the sandbox / hosting environment the daemon runs in.
    validations:
      required: true
