version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - perfsprint
    - prealloc
    - revive
    - unconvert
    - unparam
    - wastedassign
  settings:
    revive:
      rules:
        - name: exported
          disabled: false
    gosec:
      excludes:
        - G115  # integer overflow conversion - too noisy on idiomatic code
  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocritic
          - unparam

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/delight-co/claude-code-fs-shell-mcp)

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
